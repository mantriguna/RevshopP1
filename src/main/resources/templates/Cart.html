<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Your Cart</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h1>Your Cart</h1>

    <!-- Add Product Form -->
    <h3>Add Product to Cart</h3>
    <form th:action="@{/cart/add}" method="post">
        <input type="hidden" name="_csrf" th:value="${_csrf.token}"/> <!-- CSRF token -->
        <div class="form-group">
            <label for="productId">Select Product</label>
            <select id="productId" name="productId" class="form-control" required>
                <option value="" disabled selected>Select a product</option>
                <option th:each="product : ${products}" th:value="${product.productId}" th:text="${product.productName}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Add to Cart</button>
    </form>

    <!-- Cart Table -->
    <h3 class="mt-5">Cart Items</h3>
    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Product Name</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Total Price</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${cart}">
            <td th:text="${item.product.productName}">Product Name</td>
            <td th:text="${item.product.category.categoryName}">Category</td>
            <td>
                <form th:action="@{/cart/update}" method="post">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}"/> <!-- CSRF token -->
                    <input type="hidden" name="cartId" th:value="${item.id}"/>
                    <input type="number" name="quantity" th:value="${item.quantity}" min="1" class="form-control" required/>
                    <button type="submit" class="btn btn-primary">Update</button>
                </form>
            </td>
            <td th:text="${item.product.price}">Price</td>
            <td th:text="${item.product.price * item.quantity}">Total Price</td>
            <td>
                <form th:action="@{/cart/remove}" method="post">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}"/> <!-- CSRF token -->
                    <input type="hidden" name="cartId" th:value="${item.id}"/>
                    <button type="submit" class="btn btn-danger">Remove</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/cart/checkout" class="btn btn-success">Proceed to Checkout</a>
</div>
</body>
</html>
