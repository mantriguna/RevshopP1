<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revshop Navbar</title>
    <link rel="stylesheet" href="/CSS/Customer-main-style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 80px;
            font-family: "Google Sans", sans-serif;
        }

        .navbar {
            margin-bottom: 20px;
            height: 100px;
        }

        .navbar-nav {
            display: flex;
            align-items: center;
        }

        .navbar-nav .nav-link {
            color: white;
        }

        .navbar-nav .nav-link:hover {
            color: #ffc107;
        }

        .dropdown-menu {
            background-color: #343a40;
            border: none;
        }

        .dropdown-item {
            color: white;
        }

        .dropdown-item:hover {
            background-color: #ffc107;
            color: black;
        }

        .profile-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }

        .search-container {
            display: flex;
            align-items: center;
            margin-right: 30px;
            position: relative;
        }

        .search-container input {
            width: 250px;
            padding: 10px;
            padding-right: 40px; /* Add space for the mic icon */
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #mic-btn {
            position: absolute;
            right: 230px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 1.5rem;
            color: #000000;
            border: none;
            background: none;
        }

        #search-btn {
            margin-left: 10px;
            padding: 10px;
            background-color: #2874f0;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #search-btn:hover {
            background-color: #0056b3;
        }

        .icon-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-grow: 1;
        }

        .navbar-nav-end {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            flex-grow: 1;
        }

        .icon-container a {
            color: white;
            font-size: 1.1rem;
            text-decoration: none;
            padding: 50px;
            cursor: pointer;
        }

        .icon-container a:hover {
            color: #ffc107;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="#">
              <b>REVSHOP</b> 
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-between" id="navbarNav">

                <!-- Text links centered -->
                <div class="icon-container">
                    <a href="" title="Home">Home</a>
                    <a href="#" title="Wishlist">Wishlist</a>
                    <a href="/Cart" title="Cart">Cart</a>
                </div>

                <div class="navbar-nav-end">
                    <!-- Search bar on the right -->
                    <div class="search-container">
                        <input type="text" class="form-control" placeholder="Search for products" id="search-input">
                        <button id="mic-btn" title="Click to speak" aria-label="Microphone">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-mic" viewBox="0 0 16 16">
                                <path d="M3.5 6.5A.5.5 0 0 1 4 7v1a4 4 0 0 0 8 0V7a.5.5 0 0 1 1 0v1a5 5 0 0 1-4.5 4.975V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 .5-.5"/>
                                <path d="M10 8a2 2 0 1 1-4 0V3a2 2 0 1 1 4 0zM8 0a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V3a3 3 0 0 0-3-3"/>
                            </svg>
                        </button>
                        <button id="search-btn" class="btn">Search</button>
                    </div>

                    <ul class="navbar-nav">
                        <!-- Profile Dropdown -->
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="profileDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                <img src="../Images/Profile-icon.png" alt="Profile" class="profile-icon">
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileDropdown">
                                <li><a class="dropdown-item" th:href="@{/customer/updateprofile}">Update Profile</a></li>
                                <li><a class="dropdown-item" th:href="@{/customer/login}">Logout</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
