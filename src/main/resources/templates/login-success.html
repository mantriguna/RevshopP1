<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Success</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .success-box {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
    </style>
    <meta http-equiv="refresh" content="3;url=/buyer/dashboard"/> <!-- Auto redirect after 3 seconds -->
</head>
<body>

    <div class="success-box">
        <h2>Login Success</h2>
        <p>You have successfully verified your OTP and logged in!</p>
        <p>Redirecting to your dashboard...</p>
    </div>

</body>
</html>
